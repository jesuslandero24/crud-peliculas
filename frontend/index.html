<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD Películas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Gestión de Películas</h1>

  <form id="form-pelicula">
    <input type="hidden" id="pelicula-id">

    <input type="text" id="titulo" placeholder="Título" required>

    <input type="text" id="director" placeholder="Director" required>

    <input type="number" id="anio" placeholder="Año" required>

    <input type="text" id="genero" placeholder="Género" required>

    <input type="number" step="0.1" min = "1" max = "10" id="calificacion" placeholder="Calificación" required>

    <button type="submit">Guardar</button>
  </form>

  <div id="lista-peliculas"></div>

  <script src="app.js"></script>
</body>
</html>
