<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineVerse</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">

    <div class="logo">
      🎬 CineVerse
    </div>

    <nav>
      <a href="#">Inicio</a>
      <a href="#">Películas</a>
      <a href="#">Favoritas</a>
      <a href="#">Acerca</a>
    </nav>

  </header>


  <!-- HERO -->
  <section class="hero">

    <div class="hero-content">

      <h1>
        Explora el universo del cine
      </h1>

      <p>
        Guarda, administra y organiza tus películas favoritas
        en una experiencia moderna y elegante.
      </p>

      <button onclick="document.getElementById('crud').scrollIntoView({ behavior: 'smooth' })">
        Explorar
      </button>

    </div>

  </section>


  <!-- CONTENIDO -->
  <main class="contenedor" id="crud">

    <!-- FORMULARIO -->
    <section class="formulario-container">

      <h2>Agregar Película</h2>

      <form id="form-pelicula">

        <input type="hidden" id="pelicula-id">

        <input
          type="text"
          id="titulo"
          placeholder="Título"
          required
        >

        <input
          type="text"
          id="director"
          placeholder="Director"
          required
        >

        <input
          type="number"
          id="anio"
          placeholder="Año"
          required
        >

        <input
          type="text"
          id="genero"
          placeholder="Género"
          required
        >

        <input
          type="number"
          step="0.1"
          min="1"
          max="10"
          id="calificacion"
          placeholder="Calificación"
          required
        >

        <button type="submit">
          Guardar Película
        </button>

      </form>

    </section>


    <!-- LISTA -->
    <section class="peliculas-container">

      <h2>Películas Registradas</h2>

      <div id="lista-peliculas"></div>

    </section>

  </main>


  <!-- FOOTER -->
  <footer>

    <p>
      🎬 CineVerse | CRUD Fullstack con HTML, CSS,
      JavaScript, Node.js y PostgreSQL
    </p>

  </footer>

  <script src="app.js"></script>

</body>
</html>
